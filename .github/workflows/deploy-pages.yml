name: Deploy to GitHub Pages

# 이 브랜치에 코드가 푸시되면 정적 사이트를 GitHub Pages로 자동 배포합니다.
# 수동 실행도 가능(Actions 탭 → Run workflow).
on:
  push:
    branches:
      - claude/hospital-companion-3d-training-t842fs
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행(중복 방지)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Pages 설정(없으면 자동 활성화 · 소스를 Actions로 전환)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 사이트 파일 업로드(저장소 루트 전체)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages로 배포
        id: deployment
        uses: actions/deploy-pages@v4
