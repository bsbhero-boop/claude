name: Deploy to GitHub Pages

# 참고: 이 저장소는 비-기본 브랜치에서 개발 중이라, GitHub Pages는
# "Deploy from a branch"(클래식) 방식으로 이 브랜치를 지정하는 것이 가장 안정적입니다.
# (그 방식은 이 워크플로 없이도 푸시 시 자동 배포됩니다.)
# 이 워크플로는 나중에 Pages 소스를 "GitHub Actions"로 쓰는 경우를 위해 수동 실행만 남겨둡니다.
on:
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행(중복 방지)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Pages 설정(없으면 자동 활성화 · 소스를 Actions로 전환)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 사이트 파일 업로드(저장소 루트 전체)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages로 배포
        id: deployment
        uses: actions/deploy-pages@v4
